<!DOCTYPE html>
<html>
<head>
    <title>SignSpeak Settings</title>
</head>
<body style="text-align:center; font-family:Arial;">

    <h2>⚙️ Settings</h2>

    <form method="POST" action="/update_threshold">
        <label>Confidence Threshold:</label>
        <input type="number" step="0.05" min="0" max="1" name="threshold" value="{{ threshold }}">
        <button type="submit">Update</button>
    </form>

    <br><br>

    <a href="/live">⬅ Back to Live</a>

</body>
</html>
