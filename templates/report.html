<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>📊 SignSpeak | Model Evaluation Report</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #0d1117;
      color: #e6edf3;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 20px;
      color: #00ff88;
    }

    img {
      margin-top: 30px;
      width: 70%;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
      border: 2px solid #00ff88;
    }

    pre {
      text-align: left;
      background: #111;
      color: #00ff88;
      padding: 20px;
      margin: 30px auto;
      border-radius: 12px;
      width: 80%;
      font-size: 15px;
      line-height: 1.5;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
    }

    .back-link {
      display: inline-block;
      margin-top: 25px;
      text-decoration: none;
      color: #00ff88;
      font-weight: bold;
      border: 2px solid #00ff88;
      padding: 10px 20px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .back-link:hover {
      background-color: #00ff88;
      color: #111;
    }

    footer {
      margin-top: 40px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>
  <h1>📊 Model Evaluation Report</h1>

  <img src="{{ conf_img }}" alt="Confusion Matrix">

  <pre>{{ accuracy_text }}</pre>

  <a href="/live" class="back-link">⬅️ Back to Live Detection</a>

  <footer>
    Made with ❤️ by Aatir & Team | SignSpeak Project (Sprint 2)
  </footer>
</body>
</html>
