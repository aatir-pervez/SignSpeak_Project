<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SignSpeak | Live Gesture Recognition</title>

  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0d1117, #111827);
      color: #e6edf3;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 20px;
      color: #00ff88;
      font-size: 32px;
      text-shadow: 0 0 20px #00ff88;
    }

    #video-container {
      margin-top: 25px;
    }

    #frame {
      width: 680px;
      height: 500px;
      border-radius: 18px;
      border: 3px solid #00ff88;
      box-shadow: 0 0 35px rgba(0, 255, 136, 0.6);
    }

    #prediction {
      margin-top: 25px;
    }

    #prediction h2 {
      font-size: 30px;
      color: #00ff88;
      margin-bottom: 5px;
    }

    #prediction h3 {
      font-size: 22px;
      color: #00d4ff;
      margin-top: 5px;
    }

    .status-box {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 12px 22px;
      border-radius: 12px;
      font-size: 17px;
      font-weight: bold;
      box-shadow: 0 0 10px rgba(255,255,255,0.1);
    }

    .badge-fps {
      background: linear-gradient(45deg, #0070f3, #00c6ff);
      color: white;
    }

    .badge-conf {
      background: linear-gradient(45deg, #ff9800, #ffc107);
      color: white;
    }

    #latencyBox {
      margin-top: 15px;
      background: #222;
      display: inline-block;
      padding: 10px 18px;
      border-radius: 10px;
    }

    .toggle-btn {
      margin-top: 25px;
      background: linear-gradient(45deg, #00ff88, #00d4ff);
      color: #111;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: 0.3s;
    }

    .toggle-btn:hover {
      transform: scale(1.1);
    }

    .toggle-btn.off {
      background: #ff4757;
      color: white;
    }

    .lang-btn {
      margin-left: 15px;
      background: linear-gradient(45deg, #ffaa00, #ffcc00);
    }

    .settings-btn {
      display:inline-block;
      margin-top:20px;
      padding:10px 22px;
      background:#444;
      color:white;
      text-decoration:none;
      border-radius:10px;
      transition: 0.3s;
    }

    .settings-btn:hover {
      background:#666;
    }

    .link-box {
      margin-top: 30px;
    }

    .report-link {
      display:inline-block;
      text-decoration: none;
      color: #00ff88;
      font-weight: bold;
      border: 2px solid #00ff88;
      padding: 12px 24px;
      border-radius: 12px;
      transition: 0.3s;
    }

    .report-link:hover {
      background-color: #00ff88;
      color: #111;
      transform: scale(1.05);
    }

    footer {
      margin-top: 50px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>

<body>

  <h1>📷 SignSpeak – Live Gesture Recognition</h1>

  <div id="video-container">
    <img id="frame" src="/frame.jpg" alt="Live camera feed">
  </div>

  <div id="prediction">
    <h2>Prediction: <span id="label">Loading...</span></h2>
    <h3 id="emotionText">Emotion: Detecting...</h3>
  </div>

  <div class="status-box">
    <div class="badge badge-fps">FPS: <span id="fps">0</span></div>
    <div class="badge badge-conf">Confidence: <span id="conf">0</span>%</div>
  </div>

  <div id="latencyBox">Latency: 0 ms</div>

  <!-- Buttons -->
  <div>
    <button id="speakBtn" class="toggle-btn" onclick="toggleSpeak()">🔊 Auto-Speak: ON</button>
    <button id="langBtn" class="toggle-btn lang-btn" onclick="toggleLang()">🌐 Language: English</button>
  </div>

  <a href="/settings" class="settings-btn">⚙ Settings</a>

  <div class="link-box">
    <a href="/report" class="report-link">📊 Model Report</a>
    <br><br>
    <a href="/benchmark" class="report-link">📈 Performance Benchmark</a>
  </div>

  <footer>
    Made with ❤️ by Aatir & Team | SignSpeak Project
  </footer>

  <script>
    function refreshFrame() {
      const frame = document.getElementById("frame");
      frame.src = "/frame.jpg?t=" + new Date().getTime();
    }
    setInterval(refreshFrame, 100);

    async function refreshPrediction() {
      try {
        const res = await fetch("/prediction");
        const data = await res.json();

        document.getElementById("label").textContent = data.label || "-";
        document.getElementById("conf").textContent = (data.conf * 100).toFixed(1);
        document.getElementById("latencyBox").textContent = "Latency: " + data.latency + " ms";

        const emotionText = document.getElementById("emotionText");
        const emotion = data.emotion || "Neutral";

        emotionText.textContent = "Emotion: " + emotion;

        // 🎨 Dynamic color
        if (emotion === "Happy") {
              emotionText.style.color = "#00ff88";   // Green
        } else if (emotion === "Sad") {
              emotionText.style.color = "#ff4d4d";   // Red
        } else {
              emotionText.style.color = "#00d4ff";   // Blue
        }  


        
        

        

        if (data.fps) document.getElementById("fps").textContent = data.fps;

      } catch (err) {
        console.error("Prediction fetch error:", err);
      }
    }
    setInterval(refreshPrediction, 1000);

    async function toggleSpeak() {
      const res = await fetch("/toggle_speak", { method: "POST" });
      const data = await res.json();
      const btn = document.getElementById("speakBtn");

      if (data.auto_speak) {
        btn.textContent = "🔊 Auto-Speak: ON";
        btn.classList.remove("off");
      } else {
        btn.textContent = "🔇 Auto-Speak: OFF";
        btn.classList.add("off");
      }
    }

    async function toggleLang() {
      const res = await fetch("/toggle_lang", { method: "POST" });
      const data = await res.json();
      const btn = document.getElementById("langBtn");

      const newLang = data.lang === "en" ? "English" : "Hindi";
      btn.textContent = `🌐 Language: ${newLang}`;
    }
  </script>

</body>
</html>
